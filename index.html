// ── Grading helpers ───────────────────────────────────────────────────────────
function norm(s) {
  return (s||"").toLowerCase().replace(/[^a-z0-9가-힣\s]/g," ").replace(/\s+/g," ").trim();
}
function wordOverlap(a, b) {
  const wa = new Set(norm(a).split(" ").filter(Boolean));
  const wb = norm(b).split(" ").filter(Boolean);
  if (!wa.size || !wb.length) return 0;
  return wb.filter(w => wa.has(w)).length / Math.max(wa.size, wb.length);
}
function gradeAnswer(student, correct, section) {
  if (section === "A") return parseInt(student) === parseInt(correct) ? "correct" : "wrong";
  if (section === "C") return (student||"").toUpperCase().trim() === correct ? "correct" : "wrong";
  if (section === "B") {
    const [eng, kor] = correct;
    const parts = (student||"").split("|");
    const engOk = wordOverlap((parts[0]||"").trim(), eng) >= 0.65;
    const korOk = wordOverlap((parts[1]||"").trim(), kor) >= 0.65;
    if (engOk && korOk) return "correct";
    if (engOk || korOk) return "review";
    if (wordOverlap(student||"", eng) >= 0.4 || wordOverlap(student||"", kor) >= 0.4) return "review";
    return "wrong";
  }
  if (section === "D") {
    const ov = wordOverlap(student||"", correct);
    if (ov >= 0.6) return "correct";
    if (ov >= 0.3) return "review";
    return "wrong";
  }
  return "wrong";
}

    if (!k.startsWith("sk-ant-")) { alert("올바른 키 형식이 아닙니다 (sk-ant-... 로 시작)"); return; }
    localStorage.setItem("elt_api_key", k);
    setApiKey(k); setApiInput(""); setApiSaved(true);
    setTimeout(() => setApiSaved(false), 2000);
  }
  function clearKey() { localStorage.removeItem("elt_api_key"); setApiKey(""); setApiInput(""); }

  function toB64(file) {
    return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
  }

  async function callVision(dataUrl, prompt) {
    if (!apiKey) throw new Error("API 키가 없습니다. ⚙ 설정에서 입력해주세요.");
    const base64 = dataUrl.split(",")[1];
    const mime = (dataUrl.match(/data:([^;]+);/) || [])[1] || "image/jpeg";
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-opus-4-5",
        max_tokens: 1000,
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: mime, data: base64 } },
          { type: "text", text: prompt }
        ]}]
      })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || `오류 ${res.status}`); }
    const data = await res.json();
    const text = (data.content?.find(b => b.type === "text")?.text || "{}").replace(/```json|```/g, "").trim();
    return JSON.parse(text);
  }

  async function handlePhoto1(file) {
    if (!apiKey) { setErr1("⚙ 설정에서 API 키를 먼저 입력해주세요"); return; }
    setErr1(""); setLoading1(true);
    const b64 = await toB64(file); setImg1(b64);
    try {
      const d = await callVision(b64, PROMPT1);
      if (d.name && !name) setName(d.name);
      if (d.sn && !sn) setSn(d.sn);
      setExtracted(p => ({ ...p, A: d.A||{}, B: d.B||{} }));
    } catch(e) { setErr1("인식 실패: " + e.message); setImg1(null); }
    setLoading1(false);
  }

  async function handlePhoto2(file) {
    if (!apiKey) { setErr2("⚙ 설정에서 API 키를 먼저 입력해주세요"); return; }
    setErr2(""); setLoading2(true);
    const b64 = await toB64(file); setImg2(b64);
    try {
      const d = await callVision(b64, PROMPT2);
      setExtracted(p => ({ ...p, C: d.C||{}, D: d.D||{} }));
    } catch(e) { setErr2("인식 실패: " + e.message); setImg2(null); }
    setLoading2(false);
  }

  function runGrade() {
    const key = ANSWER_KEYS[form]; const res = {};
    for (let i=1;i<=25;i++)   res[i]={section:"A",student:extracted.A?.[i]||"",correct:key.A[i],result:gradeAnswer(extracted.A?.[i],key.A[i],"A")};
    for (let i=26;i<=50;i++)  res[i]={section:"B",student:extracted.B?.[i]||"",correct:key.B[i],result:gradeAnswer(extracted.B?.[i],key.B[i],"B")};
    for (let i=51;i<=80;i++)  res[i]={section:"C",student:extracted.C?.[i]||"",correct:key.C[i],result:gradeAnswer(extracted.C?.[i],key.C[i],"C")};
    for (let i=81;i<=100;i++) res[i]={section:"D",student:extracted.D?.[i]||"",correct:key.D[i],result:gradeAnswer(extracted.D?.[i],key.D[i],"D")};
    setResults(res); setOverrides({});
  }

  function calcScore(res, ov) {
    if (!res) return 0;
    let s = 0;
    for (let i=1;i<=100;i++) { const f = ov[i]!==undefined?(ov[i]?"correct":"wrong"):res[i].result; if (f==="correct") s++; }
    return s;
  }
  function reviewLeft() {
    if (!results) return 0;
    return Object.entries(results).filter(([q,r]) => overrides[q]===undefined && r.result==="review").length;
  }
  function saveToRoster() {
    const score = calcScore(results, overrides);
    setRoster(p => [...p, { name, sn, form, score, time: new Date().toLocaleTimeString("ko-KR") }]);
    setName(""); setSn(""); setImg1(null); setImg2(null); setExtracted({}); setResults(null); setOverrides({});
  }
  function resetAll() {
    setName(""); setSn(""); setImg1(null); setImg2(null); setExtracted({}); setResults(null); setOverrides({}); setErr1(""); setErr2("");
  }

  const score = calcScore(results, overrides);
  const rl = reviewLeft();
  const canGrade = extracted.A && Object.keys(extracted.A).length > 0 && extracted.C && Object.keys(extracted.C).length > 0;

  // ── styles ────────────────────────────────────────────────────────────────
  const s = {
    topbar: { background:"#0d1117", borderBottom:"1px solid #21262d", padding:"0 16px", display:"flex", alignItems:"center", gap:10, height:50, position:"sticky", top:0, zIndex:100 },
    logo: { fontWeight:700, fontSize:14, color:"#58a6ff", letterSpacing:".06em" },
    nb: (a) => ({ padding:"5px 14px", borderRadius:6, border:a?"none":"1.5px solid #30363d", background:a?"#1f6feb":"transparent", color:a?"#fff":"#8b949e", cursor:"pointer", fontSize:12, fontWeight:700 }),
    card: { background:"#161b22", borderRadius:10, border:"1px solid #21262d", padding:16, marginBottom:12 },
    sh: { fontSize:10, fontWeight:700, letterSpacing:".1em", color:"#8b949e", textTransform:"uppercase", paddingBottom:8, borderBottom:"1px solid #21262d", marginBottom:12, display:"flex", justifyContent:"space-between" },
    inp: { background:"#0d1117", border:"1.5px solid #30363d", borderRadius:6, color:"#e2e8f0", padding:"7px 10px", fontSize:13, width:"100%", outline:"none" },
    photoBox: (has) => ({ border:`2px dashed ${has?"#238636":"#30363d"}`, borderRadius:10, padding:14, textAlign:"center", cursor:"pointer", background:has?"#0d2818":"transparent", minHeight:110, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:6 }),
    btn: (c) => ({ padding:"9px 16px", borderRadius:7, border:"none", background:c==="green"?"#238636":c==="blue"?"#1f6feb":c==="red"?"#da3633":"#21262d", color:"#fff", cursor:"pointer", fontSize:13, fontWeight:700 }),
  };

  // ── ResultRow ─────────────────────────────────────────────────────────────
  function ResultRow({ q, r, ov, onOv }) {
    const fin = ov!==undefined?(ov?"correct":"wrong"):r.result;
    const bg = fin==="correct"?"transparent":fin==="review"?"#2d1f00":"#1c0a0a";
    const bd = fin==="correct"?"#21262d":fin==="review"?"#9e6a03":"#6e1919";
    const correctStr = r.section==="B" ? `${r.correct[0]} / ${r.correct[1]}` : String(r.correct);
    return (
      <div style={{display:"grid",gridTemplateColumns:"26px 1fr auto",gap:8,alignItems:"start",padding:"6px 10px",borderRadius:6,marginBottom:3,background:bg,border:`1px solid ${bd}`}}>
        <span style={{fontSize:10,color:"#8b949e",fontWeight:700,paddingTop:2}}>{q}.</span>
        <div>
          <div style={{fontSize:12,color:fin==="correct"?"#7ee787":fin==="review"?"#f0883e":"#f85149",wordBreak:"break-all"}}>
            {r.student || <em style={{color:"#484f58"}}>미입력</em>}
          </div>
          {fin!=="correct" && <div style={{fontSize:10,color:"#484f58",marginTop:2}}>정답: <span style={{color:"#58a6ff"}}>{correctStr}</span></div>}
        </div>
        <div style={{display:"flex",gap:3,alignItems:"center"}}>
          {(r.result==="review"||ov!==undefined) && <>
            <button onClick={()=>onOv(true)}  style={{width:26,height:24,borderRadius:4,border:`1.5px solid ${ov===true?"#238636":"#30363d"}`,background:ov===true?"#0d2818":"transparent",color:ov===true?"#56d364":"#8b949e",cursor:"pointer",fontSize:11}}>O</button>
            <button onClick={()=>onOv(false)} style={{width:26,height:24,borderRadius:4,border:`1.5px solid ${ov===false?"#da3633":"#30363d"}`,background:ov===false?"#1c0a0a":"transparent",color:ov===false?"#f85149":"#8b949e",cursor:"pointer",fontSize:11}}>X</button>
          </>}
          <span style={{fontSize:12}}>{fin==="correct"?"✅":fin==="review"?"⚠️":"❌"}</span>
        </div>
      </div>
    );
  }

  // ── render ────────────────────────────────────────────────────────────────
  return (
    <div style={{background:"#0d1117",minHeight:"100vh",color:"#e2e8f0",paddingBottom:60}}>

      {/* TOPBAR */}
      <div style={s.topbar}>
        <div style={s.logo}>ELT GRADER</div>
        <div style={{flex:1}}/>
        <button style={s.nb(tab==="grade")} onClick={()=>{setTab("grade");setShowSettings(false)}}>채점</button>
        <button style={{...s.nb(tab==="roster"),position:"relative"}} onClick={()=>{setTab("roster");setShowSettings(false)}}>
          성적표{roster.length>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#da3633",color:"#fff",borderRadius:99,fontSize:9,fontWeight:700,padding:"1px 4px"}}>{roster.length}</span>}
        </button>
        <button onClick={()=>setShowSettings(v=>!v)} style={{width:34,height:34,borderRadius:7,border:`1.5px solid ${showSettings?"#58a6ff":"#30363d"}`,background:showSettings?"#0d2b45":"transparent",color:showSettings?"#58a6ff":"#8b949e",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
      </div>

      {/* SETTINGS */}
      {showSettings && <>
        <div style={{position:"fixed",inset:0,zIndex:150}} onClick={()=>setShowSettings(false)}/>
        <div style={{position:"fixed",top:54,right:12,width:340,background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:18,zIndex:200,boxShadow:"0 8px 32px rgba(0,0,0,.7)",animation:"fadeIn .15s ease"}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"#8b949e",marginBottom:12,textTransform:"uppercase"}}>설정</div>
          <div style={{fontSize:11,color:"#8b949e",marginBottom:6}}>Anthropic API 키</div>
          {apiKey ? (
            <div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>

                  {showKey ? apiKey : "sk-ant-••••••••••••••••"}

              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#56d364"}}>✓ 저장됨</span>
                <button onClick={clearKey} style={{padding:"3px 10px",borderRadius:5,border:"1px solid #6e1919",background:"transparent",color:"#f85149",cursor:"pointer",fontSize:11}}>삭제</button>

          ) : (
            <div>
              <div style={{display:"flex",gap:8,marginBottom:6}}>
                <input style={{...s.inp,flex:1,fontSize:12}} type="password" value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="sk-ant-api03-..." onKeyDown={e=>e.key==="Enter"&&saveKey()}/>
                <button onClick={saveKey} style={{...s.btn("blue"),padding:"7px 12px",fontSize:12,whiteSpace:"nowrap"}}>저장</button>
              </div>
              {apiSaved && <div style={{fontSize:11,color:"#56d364"}}>✓ 저장됐어요!</div>}
              <div style={{fontSize:10,color:"#484f58",marginTop:6,lineHeight:1.6}}>브라우저에만 저장돼요.<br/>발급: console.anthropic.com → API Keys</div>
            </div>
          )}
        </div>
      </>}

      {/* API 키 경고 */}
      {!apiKey && (
        <div style={{background:"#2d1f00",borderBottom:"1px solid #9e6a03",padding:"8px 16px",fontSize:12,color:"#f0883e",display:"flex",alignItems:"center",gap:8}}>
          ⚠ 사진 인식을 위해 API 키가 필요해요.
          <button onClick={()=>setShowSettings(true)} style={{marginLeft:"auto",padding:"3px 10px",borderRadius:5,border:"1px solid #9e6a03",background:"transparent",color:"#f0883e",cursor:"pointer",fontSize:11}}>⚙ 설정</button>
        </div>
      )}

      {/* ── GRADE TAB ── */}
      {tab==="grade" && (
        <div style={{maxWidth:700,margin:"0 auto",padding:"16px 12px"}}>

          {/* 학생 정보 */}
          <div style={s.card}>
            <div style={s.sh}><span>학생 정보</span></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 2fr",gap:10}}>
              <div>
                <div style={{fontSize:10,color:"#8b949e",marginBottom:5}}>폼 선택</div>
                <select style={s.inp} value={form} onChange={e=>setForm(e.target.value)}>
                  {Object.entries(FORM_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:10,color:"#8b949e",marginBottom:5}}>이름</div>
                <input style={s.inp} value={name} onChange={e=>setName(e.target.value)} placeholder="자동 인식됩니다"/>
              </div>
              <div>
                <div style={{fontSize:10,color:"#8b949e",marginBottom:5}}>군번 SN</div>
                <input style={s.inp} value={sn} onChange={e=>setSn(e.target.value)} placeholder="자동 인식됩니다"/>
              </div>
            </div>
          </div>

          {/* 사진 업로드 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

            {/* 1장 */}
            <div style={s.card}>
              <div style={s.sh}><span>1장 — 섹션 A · B</span></div>
              <input type="file" accept="image/*" capture="environment" ref={ref1} style={{display:"none"}} onChange={e=>e.target.files[0]&&handlePhoto1(e.target.files[0])}/>
              <div style={s.photoBox(!!img1)} onClick={()=>ref1.current.click()}>
                {loading1 ? <>
                  <div style={{fontSize:20,animation:"spin 1s linear infinite"}}>⚙️</div>
                  <div style={{fontSize:11,color:"#8b949e"}}>인식 중...</div>
                </> : img1 ? <>
                  <img src={img1} style={{maxHeight:80,borderRadius:6,maxWidth:"100%"}}/>
                  <div style={{fontSize:10,color:"#56d364"}}>✓ {Object.keys(extracted.A||{}).length + Object.keys(extracted.B||{}).length}문항 인식</div>
                  <div style={{fontSize:10,color:"#58a6ff"}}>클릭하여 재촬영</div>
                </> : <>
                  <div style={{fontSize:26}}>📷</div>
                  <div style={{fontSize:12,color:"#58a6ff",fontWeight:700}}>촬영</div>
                  <div style={{fontSize:10,color:"#8b949e"}}>번호 + 약어 (1~50번)</div>
                </>}
              </div>
              {err1 && <div style={{fontSize:11,color:"#f85149",marginTop:8,padding:"5px 9px",background:"#1c0a0a",borderRadius:6}}>{err1}</div>}
            </div>

            {/* 2장 */}
            <div style={s.card}>
              <div style={s.sh}><span>2장 — 섹션 C · D</span></div>
              <input type="file" accept="image/*" capture="environment" ref={ref2} style={{display:"none"}} onChange={e=>e.target.files[0]&&handlePhoto2(e.target.files[0])}/>
              <div style={s.photoBox(!!img2)} onClick={()=>ref2.current.click()}>
                {loading2 ? <>
                  <div style={{fontSize:20,animation:"spin 1s linear infinite"}}>⚙️</div>
                  <div style={{fontSize:11,color:"#8b949e"}}>인식 중...</div>
                </> : img2 ? <>
                  <img src={img2} style={{maxHeight:80,borderRadius:6,maxWidth:"100%"}}/>
                  <div style={{fontSize:10,color:"#56d364"}}>✓ {Object.keys(extracted.C||{}).length + Object.keys(extracted.D||{}).length}문항 인식</div>
                  <div style={{fontSize:10,color:"#58a6ff"}}>클릭하여 재촬영</div>
                </> : <>
                  <div style={{fontSize:26}}>📷</div>
                  <div style={{fontSize:12,color:"#58a6ff",fontWeight:700}}>촬영</div>
                  <div style={{fontSize:10,color:"#8b949e"}}>T/F + 빈칸 (51~100번)</div>
                </>}
              </div>
              {err2 && <div style={{fontSize:11,color:"#f85149",marginTop:8,padding:"5px 9px",background:"#1c0a0a",borderRadius:6}}>{err2}</div>}
            </div>

          </div>

          {canGrade && !results && (
            <button onClick={runGrade} style={{...s.btn("green"),width:"100%",padding:13,fontSize:14,marginBottom:12}}>채점 실행 →</button>
          )}

          {results && (<>
            {/* 점수 헤더 */}
            <div style={{...s.card,display:"flex",alignItems:"center",gap:16,background:"linear-gradient(135deg,#161b22,#0d1117)"}}>
              <div style={{textAlign:"center",minWidth:76}}>
                <div style={{fontSize:48,fontWeight:700,lineHeight:1,color:score>=80?"#56d364":score>=60?"#f0883e":"#f85149"}}>{score}</div>
                <div style={{fontSize:10,color:"#8b949e",marginTop:3}}>/ 100점</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15}}>{name||"이름 없음"} <span style={{color:"#8b949e",fontWeight:400,fontSize:12}}>{sn}</span></div>
                <div style={{fontSize:11,color:"#8b949e",marginTop:3}}>{FORM_LABELS[form]}</div>
                {rl>0&&<div style={{marginTop:7,fontSize:11,color:"#f0883e",background:"#2d1f00",border:"1px solid #9e6a03",borderRadius:5,padding:"4px 9px"}}>⚠ 검토 필요 {rl}문항 — O/X 확인 후 저장 가능</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <button onClick={saveToRoster} disabled={rl>0} style={{...s.btn("blue"),opacity:rl>0?.4:1,cursor:rl>0?"not-allowed":"pointer",whiteSpace:"nowrap"}}>저장 →</button>
                <button onClick={resetAll} style={{...s.btn("gray"),fontSize:11}}>초기화</button>
              </div>
            </div>

            {/* 섹션별 결과 */}
            {[{label:"섹션 A — 번호 찾기",r:[1,25]},{label:"섹션 B — 약어 원형",r:[26,50]},{label:"섹션 C — 참/거짓",r:[51,80]},{label:"섹션 D — 빈칸 채우기",r:[81,100]}].map(({label,r})=>{
              const qs = Array.from({length:r[1]-r[0]+1},(_,i)=>i+r[0]);
              const correct = qs.filter(q=>(overrides[q]!==undefined?overrides[q]:results[q].result==="correct")).length;
              const rev = qs.filter(q=>overrides[q]===undefined&&results[q].result==="review").length;
              return (
                <div key={label} style={s.card}>
                  <div style={s.sh}>
                    <span>{label}</span>
                    <span style={{color:rev>0?"#f0883e":"#56d364"}}>{correct}/{qs.length}{rev>0?` (검토 ${rev})`:" ✓"}</span>
                  </div>
                  {qs.map(q=><ResultRow key={q} q={q} r={results[q]} ov={overrides[q]} onOv={v=>setOverrides(p=>({...p,[q]:v}))}/>)}
                </div>
              );
            })}

            <button onClick={saveToRoster} disabled={rl>0} style={{...s.btn("blue"),width:"100%",padding:12,fontSize:13,opacity:rl>0?.4:1,cursor:rl>0?"not-allowed":"pointer"}}>
              {rl>0?`⚠ 검토 ${rl}문항 남음`:`성적표에 저장 (${score}점)`}
            </button>
          </>)}
        </div>
      )}

      {/* ── ROSTER TAB ── */}
      {tab==="roster" && (
        <div style={{maxWidth:780,margin:"0 auto",padding:"16px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16}}>성적표 <span style={{color:"#8b949e",fontSize:13,fontWeight:400}}>({roster.length}명)</span></div>
            {roster.length>0&&<div style={{fontSize:12,color:"#8b949e",display:"flex",gap:14}}>
              <span>평균 <strong style={{color:"#e2e8f0"}}>{(roster.reduce((s,r)=>s+r.score,0)/roster.length).toFixed(1)}</strong></span>
              <span>최고 <strong style={{color:"#56d364"}}>{Math.max(...roster.map(r=>r.score))}</strong></span>
              <span>최저 <strong style={{color:"#f85149"}}>{Math.min(...roster.map(r=>r.score))}</strong></span>
            </div>}
          </div>
          {roster.length===0 ? (
            <div style={{textAlign:"center",padding:"60px 0",color:"#484f58"}}>
              <div style={{fontSize:34,marginBottom:10}}>📋</div>
              <div style={{fontSize:13}}>아직 채점된 학생이 없어요</div>
            </div>
          ) : (
            <div style={{background:"#161b22",borderRadius:10,border:"1px solid #21262d",overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#0d1117",fontSize:10,color:"#8b949e",letterSpacing:".06em"}}>
                    {["순위","이름","군번","폼","점수","등급","시각"].map(h=>(
                      <th key={h} style={{padding:"8px 14px",textAlign:h==="점수"||h==="등급"?"center":"left"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...roster].sort((a,b)=>b.score-a.score).map((r,i)=>{
                    const g=r.score>=90?"A":r.score>=80?"B":r.score>=70?"C":r.score>=60?"D":"F";
                    const gc=r.score>=80?"#56d364":r.score>=60?"#f0883e":"#f85149";
                    return (
                      <tr key={i} style={{borderTop:"1px solid #0d1117"}}>
                        <td style={{padding:"10px 14px",color:"#8b949e",fontSize:12}}>{i+1}</td>
                        <td style={{padding:"10px 14px",fontWeight:600,fontSize:13}}>{r.name}</td>
                        <td style={{padding:"10px 14px",color:"#8b949e",fontSize:11}}>{r.sn}</td>
                        <td style={{padding:"10px 14px",fontSize:11,color:"#58a6ff"}}>{r.form}</td>
                        <td style={{padding:"10px 14px",textAlign:"center"}}><span style={{fontSize:20,fontWeight:700,color:gc}}>{r.score}</span></td>
                        <td style={{padding:"10px 14px",textAlign:"center"}}>
                          <span style={{padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:700,background:r.score>=80?"#0d2818":r.score>=60?"#2d1f00":"#1c0a0a",color:gc,border:`1px solid ${gc}`}}>{g}</span>
                        </td>
                        <td style={{padding:"10px 14px",color:"#8b949e",fontSize:11}}>{r.time}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
