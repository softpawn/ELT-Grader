function norm(s){ return (s||"").toLowerCase().replace(/[^a-z0-9가-힣\s]/g," ").replace(/\s+/g," ").trim(); }
function normKor(s){ return (s||"").replace(/\s+/g,"").toLowerCase(); }  // 한국어: 띄어쓰기 무시
function overlapKor(a, b){
  // For Korean: also try space-stripped comparison
  const na=normKor(a), nb=normKor(b);
  if(!na||!nb) return 0;
  if(na===nb) return 1;
  if(na.includes(nb)||nb.includes(na)) return 0.9;
  // fallback to word overlap
  return overlap(a,b);
}
function overlap(a,b){ const wa=new Set(norm(a).split(" ").filter(Boolean)),wb=norm(b).split(" ").filter(Boolean); if(!wa.size||!wb.length)return 0; return wb.filter(w=>wa.has(w)).length/Math.max(wa.size,wb.length); }

function expandAlts(correct) {
  // Split by " / " first
  const slashParts = correct.split(/\s*\/\s*/);
  const alts = [];
  slashParts.forEach(part => {
    part = part.trim();
    alts.push(part);
    // Also add version without parenthetical: "데프콘(방어준비태세)" → "데프콘"
    const withoutParen = part.replace(/\s*\([^)]*\)/g, '').trim();
    if(withoutParen && withoutParen !== part) alts.push(withoutParen);
    // Also add just the parenthetical content: "(방어준비태세)" → "방어준비태세"
    const parenMatch = part.match(/\(([^)]+)\)/g);
    if(parenMatch) parenMatch.forEach(p => alts.push(p.replace(/[()]/g,'').trim()));
  });
  return [...new Set(alts.filter(Boolean))];
}
function matchesAny(student, correct, isKor=false) {
  const alts = expandAlts(correct);
  if(isKor) return alts.some(alt => overlapKor(student, alt) >= 0.85);
  return alts.some(alt => overlap(student, alt) >= 0.65);
}
function matchesAnyWeak(student, correct, isKor=false) {
  const alts = expandAlts(correct);
  if(isKor) return alts.some(alt => overlapKor(student, alt) >= 0.6);
  return alts.some(alt => overlap(student, alt) >= 0.4);
}
function gradeAcronym(student, q) {
  const parts = (student||"").split("|");
  const engAns = (parts[0]||"").trim();
  const korAns = (parts[1]||"").trim();
  const eok = matchesAny(engAns, q.full, false);
  const kok = matchesAny(korAns, q.kor, true);
  if(eok && kok) return "correct";
  if(eok || kok) return "review";
  if(matchesAnyWeak(student||"", q.full, false) || matchesAnyWeak(student||"", q.kor, true)) return "review";
  return "wrong";
}

function gradeMatching(student, correctAnswer) {
  return parseInt(student) === correctAnswer ? "correct" : "wrong";
}

// 신뢰도 포함 채점 — {result, confidence}
function scoreB(student, eng, kor){
  const parts=(student||"").split("|");
  const engAns=(parts[0]||"").trim(), korAns=(parts[1]||"").trim();
  const engAlts=expandAlts(eng), korAlts=expandAlts(kor);
  const eScore=Math.max(...engAlts.map(a=>overlap(engAns,a)));
  const kScore=Math.max(...korAlts.map(a=>overlapKor(korAns,a)));
  return {eScore, kScore};
}
function gradeFinalWithConf(student, correct, sec){
  if(sec==="A"){
    const ok=parseInt(student)===parseInt(correct);
    return {result:ok?"correct":"wrong", confidence:ok?1:0};
  }
  if(sec==="C"){
    const ok=(student||"").toUpperCase().trim()===correct;
    return {result:ok?"correct":"wrong", confidence:ok?1:0};
  }
  if(sec==="B"){
    const[eng,kor]=correct;
    const{eScore,kScore}=scoreB(student,eng,kor);
    const conf=Math.min((eScore+kScore)/2, 1);
    if(eScore>=0.65&&kScore>=0.85)return{result:"correct",confidence:conf};
    if(eScore>=0.65||kScore>=0.85)return{result:"review",confidence:conf};
    if(eScore>=0.4||kScore>=0.6)return{result:"review",confidence:conf*0.5};
    return{result:"wrong",confidence:conf};
  }
  if(sec==="D"){
    const sw=(student||"").trim().split(/\s+/).filter(Boolean);
    const cw=correct.trim().split(/\s+/).filter(Boolean);
    const v=overlap(student||"",correct);
    const cov=sw.length/cw.length;
    const conf=v*Math.min(cov,1);
    if(v>=0.6&&cov>=0.5)return{result:"correct",confidence:conf};
    if(v>=0.4)return{result:"review",confidence:conf*0.6};
    return{result:"wrong",confidence:conf};
  }
  return{result:"wrong",confidence:0};
}
function gradeFinal(student, correct, sec){
  return gradeFinalWithConf(student,correct,sec).result;
}

function gradeAcronymWithConf(student, q){
  const parts=(student||"").split("|");
  const engAns=(parts[0]||"").trim(), korAns=(parts[1]||"").trim();
  const engAlts=expandAlts(q.full), korAlts=expandAlts(q.kor);
  const eScore=Math.max(...engAlts.map(a=>overlap(engAns,a)));
  const kScore=Math.max(...korAlts.map(a=>overlapKor(korAns,a)));
  const conf=Math.min((eScore+kScore)/2,1);
  if(eScore>=0.65&&kScore>=0.85)return{result:"correct",confidence:conf};
  if(eScore>=0.65||kScore>=0.85)return{result:"review",confidence:conf};
  if(eScore>=0.4||kScore>=0.6)return{result:"review",confidence:conf*0.5};
  return{result:"wrong",confidence:conf};
}

function CRow({q,student,correct,result,ov,onOv}){
  const fin=ov!==undefined?(ov?"correct":"wrong"):result;

    <div style={{display:"grid",gridTemplateColumns:"26px 28px 28px 1fr auto",gap:5,alignItems:"center",padding:"5px 8px",borderRadius:7,marginBottom:3,background:bg,border:`1.5px solid ${bd}`}}>

function RRow({q,student,correct,correctStr,result,ov,onOv,confidence}){
  const fin=ov!==undefined?(ov?"correct":"wrong"):result;
  // 정답이지만 신뢰도 낮으면 주황 테두리로 표시
  const lowConf = fin==="correct" && confidence!==undefined && confidence<LOW_CONF && ov===undefined;
  const bg=fin==="correct"?"transparent":fin==="review"?C.yellowL:C.redL;
  const bd=lowConf?"#f6ad55":fin==="correct"?C.border:fin==="review"?"#f6e05e":"#feb2b2";
  const tc=fin==="correct"?C.greenD:fin==="review"?C.yellow:C.redD;
  const btnStyle = (active, color) => ({
    width:30, height:26, borderRadius:6,
    border:`1.5px solid ${active?color:fin==="correct"?"#e8f5e9":C.border}`,
    background:active?(color==="#38a169"?C.greenL:C.redL):"transparent",
    color:active?(color==="#38a169"?C.greenD:C.redD):(fin==="correct"?"#c8e6c9":C.muted),

        {lowConf&&<div style={{fontSize:11,color:"#c05621",fontWeight:700,marginTop:2}}>⚠ 요확인 (신뢰도 {Math.round(confidence*100)}%)</div>}
      </div>
      <div style={{display:"flex",gap:3,alignItems:"center"}}>
        <button onClick={()=>onOv(ov===true?undefined:true)}
          style={btnStyle(ov===true,"#38a169")}>O</button>

      </div>
    </div>
  );
}

        <div style={{fontSize:13,fontWeight:700,color:C.muted,marginTop:3}}>{subtitle}</div>
        {rl>0&&<div style={{marginTop:8,fontSize:13,fontWeight:700,color:"#744210",background:C.yellowL,border:"2px solid #f6c90e",borderRadius:8,padding:"6px 10px"}}>⚠ 검토 {rl}문항 — O/X 후 저장</div>}
        {lowConf>0&&rl===0&&<div style={{marginTop:8,fontSize:12,fontWeight:700,color:"#c05621",background:"#fffaf0",border:"2px solid #f6ad55",borderRadius:8,padding:"5px 10px"}}>🟡 신뢰도 낮은 정답 {lowConf}문항 확인 권장</div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <button onClick={onSave} disabled={rl>0} style={{padding:"10px 14px",borderRadius:9,border:"none",background:rl>0?"#cbd5e0":C.blue,color:"#fff",cursor:rl>0?"not-allowed":"pointer",fontSize:14,fontWeight:800,whiteSpace:"nowrap"}}>저장 →</button>
        <button onClick={onReset} style={{padding:"8px 10px",borderRadius:9,border:`2px solid ${C.border}`,background:C.white,color:C.muted,cursor:"pointer",fontSize:13,fontWeight:700}}>초기화</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("final");
  const [showSet,setShowSet]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("elt_api_key")||"");
  const [apiInp,setApiInp]=useState("");
  const [apiOk,setApiOk]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const [roster,setRoster]=useState([]);

  // FINAL state
  const [fForm,setFForm]=useState("K8T2A4");
  const [fName,setFName]=useState(""); const [fSn,setFSn]=useState("");
  const [fImg1,setFImg1]=useState(null); const [fImg2,setFImg2]=useState(null);
  const [fLd1,setFLd1]=useState(false); const [fLd2,setFLd2]=useState(false);
  const [fEr1,setFEr1]=useState(""); const [fEr2,setFEr2]=useState("");
  const [fExt,setFExt]=useState({});
  const [fRes,setFRes]=useState(null); const [fOv,setFOv]=useState({});
  const fRef1=useRef(); const fRef2=useRef();

  // ACRONYM state
  const [aForm,setAForm]=useState("A"); const [aDay,setADay]=useState("Day2");
  const [aNm,setANm]=useState(""); const [aSn,setASn]=useState("");
  const [aImg,setAImg]=useState(null); const [aLd,setALd]=useState(false);
  const [aEr,setAEr]=useState("");
  const [aRes,setARes]=useState(null); const [aOv,setAOv]=useState({});
  const aRef=useRef();

  // MATCHING state
  const [mUnit,setMUnit]=useState("Unit1");
  const [mNm,setMNm]=useState(""); const [mSn,setMSn]=useState("");
  const [mImg,setMImg]=useState(null); const [mLd,setMLd]=useState(false);
  const [mImg2,setMImg2]=useState(null); const [mLd2,setMLd2]=useState(false);
  const [mEr,setMEr]=useState(""); const [mEr2,setMEr2]=useState("");
  const [mRes,setMRes]=useState(null); const [mOv,setMOv]=useState({});
  const mRef=useRef(); const mRef2=useRef();

  function saveKey(){
    const k=apiInp.trim();
    if(!k.startsWith("sk-ant-")){alert("올바른 키 형식이 아닙니다 (sk-ant-... 로 시작)");return;}
    localStorage.setItem("elt_api_key",k);setApiKey(k);setApiInp("");setApiOk(true);
    setTimeout(()=>setApiOk(false),2000);
  }
  function clearKey(){localStorage.removeItem("elt_api_key");setApiKey("");setApiInp("");}

  function toB64(f){return new Promise((r,e)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=e;rd.readAsDataURL(f);});}

  async function callV(url,prompt){
    if(!apiKey)throw new Error("API 키 없음");
    const b64=url.split(",")[1],mime=(url.match(/data:([^;]+);/)||[])[1]||"image/jpeg";
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-opus-4-5",max_tokens:2000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:prompt}
      ]}]})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`오류 ${r.status}`);}
    const d=await r.json();
    return JSON.parse((d.content?.find(b=>b.type==="text")?.text||"{}").replace(/```json|```/g,"").trim());
  }

  // ── FINAL handlers ──────────────────────────────────────────
  async function fHP1(file){
    if(!apiKey){setFEr1("⚙ API 키를 먼저 입력해주세요");return;}
    setFEr1("");setFLd1(true);
    const b=await toB64(file);setFImg1(b);
    try{
      // 1차 호출: 섹션 A + 섹션 B 영어
      setFLd1(1);
      const d1=await callV(b,P_FINAL1A);
      if(d1.name&&!fName)setFName(d1.name);
      if(d1.sn&&!fSn)setFSn(d1.sn);
      const engMap=d1.B_eng||{};

      // 2차 호출: 섹션 B 한국어만 (같은 사진)
      setFLd1(2);
      const d2=await callV(b,P_FINAL1B);
      const korMap=d2.B_kor||{};

      // 두 결과 합쳐서 B섹션 구성: "영어|한국어"
      const B={};
      const allNums=new Set([...Object.keys(engMap),...Object.keys(korMap)]);
      allNums.forEach(n=>{
        const eng=(engMap[n]||"").trim();
        const kor=(korMap[n]||"").trim();
        B[n]=eng&&kor?`${eng}|${kor}`:eng||kor;
      });

      setFExt(p=>({...p,A:d1.A||{},B}));
    }
    catch(e){setFEr1("인식 실패: "+e.message);setFImg1(null);}
    setFLd1(false);
  }
  async function fHP2(file){
    if(!apiKey){setFEr2("⚙ API 키를 먼저 입력해주세요");return;}
    setFEr2("");setFLd2(true);
    const b=await toB64(file);setFImg2(b);
    try{const d=await callV(b,P_FINAL2);setFExt(p=>({...p,C:d.C||{},D:d.D||{}}));}
    catch(e){setFEr2("인식 실패: "+e.message);setFImg2(null);}
    setFLd2(false);
  }
  function runFinal(){
    const k=FINAL_KEYS[fForm],r={};
    for(let i=1;i<=25;i++){  const g=gradeFinalWithConf(fExt.A?.[i]||"",k.A[i],"A"); r[i]={sec:"A",student:fExt.A?.[i]||"",correct:k.A[i],...g};}
    for(let i=26;i<=50;i++){ const g=gradeFinalWithConf(fExt.B?.[i]||"",k.B[i],"B"); r[i]={sec:"B",student:fExt.B?.[i]||"",correct:k.B[i],...g};}
    for(let i=51;i<=80;i++){ const g=gradeFinalWithConf(fExt.C?.[i]||"",k.C[i],"C"); r[i]={sec:"C",student:fExt.C?.[i]||"",correct:k.C[i],...g};}
    for(let i=81;i<=100;i++){const g=gradeFinalWithConf(fExt.D?.[i]||"",k.D[i],"D"); r[i]={sec:"D",student:fExt.D?.[i]||"",correct:k.D[i],...g};}
    setFRes(r);setFOv({});
  }
  function fScore(){if(!fRes)return 0;let s=0;for(let i=1;i<=100;i++){const f=fOv[i]!==undefined?(fOv[i]?"correct":"wrong"):fRes[i].result;if(f==="correct")s++;}return s;}
  function fRL(){if(!fRes)return 0;return Object.entries(fRes).filter(([,r])=>fOv[r]===undefined&&r.result==="review").length;}
  function fReviewLeft(){if(!fRes)return 0;return Object.values(fRes).filter((r,i)=>fOv[i+1]===undefined&&r.result==="review").length;}
  function saveFinal(){
    const sc=fScore();
    setRoster(p=>[...p,{type:"Final",name:fName,sn:fSn,subtitle:FINAL_LABELS[fForm],score:sc,total:100,time:new Date().toLocaleTimeString("ko-KR")}]);
    setFName("");setFSn("");setFImg1(null);setFImg2(null);setFExt({});setFRes(null);setFOv({});
  }
  function resetFinal(){setFName("");setFSn("");setFImg1(null);setFImg2(null);setFExt({});setFRes(null);setFOv({});setFEr1("");setFEr2("");}

  const fCanGrade=fExt.A&&Object.keys(fExt.A).length>0&&fExt.C&&Object.keys(fExt.C).length>0;
  const fSc=fScore();
  const fRl=Object.entries(fRes||{}).filter(([q,r])=>fOv[q]===undefined&&r.result==="review").length;

  // ── ACRONYM handlers ────────────────────────────────────────
  const acKey=`Form${aForm}_${aDay}`;
  const acQs=ACRONYM_KEYS[acKey]||[];

  async function aHP(file){
    if(!apiKey){setAEr("⚙ API 키를 먼저 입력해주세요");return;}
    setAEr("");setALd(true);
    const b=await toB64(file);setAImg(b);
    try{
      // 1차: 영어만
      setALd(1);
      const d1=await callV(b,P_ACRONYM_ENG(acQs.length));
      const engAns=d1.answers||{};
      // 2차: 한국어만 (같은 사진)
      setALd(2);
      const d2=await callV(b,P_ACRONYM_KOR(acQs.length));
      const korAns=d2.answers||{};

      const r={};
      acQs.forEach(q=>{
        const eng=(engAns[q.no]||engAns[String(q.no)]||"").trim();
        const kor=(korAns[q.no]||korAns[String(q.no)]||"").trim();
        const student=eng&&kor?`${eng}|${kor}`:eng||kor;
        const g=gradeAcronymWithConf(student,q);
        r[q.no]={student,q,...g};
      });
      setARes(r);setAOv({});
    }catch(e){setAEr("인식 실패: "+e.message);setAImg(null);}
    setALd(false);
  }
  function saveAcronym(){
    const total=acQs.length;
    let sc=0;
    acQs.forEach(q=>{const f=aOv[q.no]!==undefined?(aOv[q.no]?"correct":"wrong"):(aRes[q.no]?.result||"wrong");if(f==="correct")sc++;});
    setRoster(p=>[...p,{type:"약어",name:aNm,sn:aSn,subtitle:`Form ${aForm} ${aDay}`,score:sc,total,time:new Date().toLocaleTimeString("ko-KR")}]);
    setANm("");setASn("");setAImg(null);setARes(null);setAOv({});
  }
  function resetAcronym(){setANm("");setASn("");setAImg(null);setARes(null);setAOv({});setAEr("");}
  const aRl=Object.entries(aRes||{}).filter(([q,r])=>aOv[q]===undefined&&r.result==="review").length;
  const aSc=aRes?acQs.reduce((s,q)=>{const f=aOv[q.no]!==undefined?(aOv[q.no]?"correct":"wrong"):(aRes[q.no]?.result||"wrong");return s+(f==="correct"?1:0);},0):0;

  // ── MATCHING handlers ───────────────────────────────────────
  const mtQs=MATCHING_KEYS[mUnit]||[];

  // Unit1: 1~30번(1장), 31~59번(2장). Unit2/3: 1장
  const isUnit1 = mUnit==="Unit1";
  const mtQs1 = isUnit1 ? mtQs.slice(0,30) : mtQs;   // 1장 분량
  const mtQs2 = isUnit1 ? mtQs.slice(30) : [];         // 2장 분량 (Unit1만)

  async function mHP(file, page=1){
    if(!apiKey){page===1?setMEr("⚙ API 키를 먼저 입력해주세요"):setMEr2("⚙ API 키를 먼저 입력해주세요");return;}
    const qs = page===1 ? mtQs1 : mtQs2;
    if(page===1){setMEr("");setMLd(true);}else{setMEr2("");setMLd2(true);}
    const b=await toB64(file);
    page===1?setMImg(b):setMImg2(b);
    try{
      const startNo = qs[0]?.no||1;
      const prompt = `You are reading a KATUSA ELT matching quiz answer sheet photo.
Extract ${qs.length} handwritten answers. Questions are numbered ${startNo} to ${qs[qs.length-1]?.no||qs.length}.
Each definition has a blank where the student writes a number (matching the term number).
Return ONLY valid JSON, no markdown: {"answers":{"${startNo}":"7","${startNo+1}":"8"}}
Blank="".`;
      const d=await callV(b,prompt);
      const ans=d.answers||{};
      setMRes(prev=>{
        const r={...(prev||{})};
        qs.forEach(q=>{
          const student=ans[q.no]||ans[String(q.no)]||"";
          r[q.no]={student,q,result:gradeMatching(student,q.answer)};
        });
        return r;
      });
      setMOv({});
    }catch(e){
      page===1?setMEr("인식 실패: "+e.message):setMEr2("인식 실패: "+e.message);
      page===1?setMImg(null):setMImg2(null);
    }
    page===1?setMLd(false):setMLd2(false);
  }
  function saveMatching(){
    const total=mtQs.length;
    let sc=0;
    mtQs.forEach(q=>{const f=mOv[q.no]!==undefined?(mOv[q.no]?"correct":"wrong"):(mRes[q.no]?.result||"wrong");if(f==="correct")sc++;});
    setRoster(p=>[...p,{type:"매칭",name:mNm,sn:mSn,subtitle:mUnit.replace("Unit","Unit "),score:sc,total,time:new Date().toLocaleTimeString("ko-KR")}]);
    setMNm("");setMSn("");setMImg(null);setMImg2(null);setMRes(null);setMOv({});
  }
  function resetMatching(){setMNm("");setMSn("");setMImg(null);setMImg2(null);setMRes(null);setMOv({});setMEr("");setMEr2("");}
  const mRl=Object.entries(mRes||{}).filter(([,r])=>mOv[r.q?.no]===undefined&&r.result==="review").length;
  const mSc=mRes?mtQs.reduce((s,q)=>{const f=mOv[q.no]!==undefined?(mOv[q.no]?"correct":"wrong"):(mRes[q.no]?.result||"wrong");return s+(f==="correct"?1:0);},0):0;
  // Unit1: 두 장 모두 찍었을 때만 채점 완료
  const mCanSave = isUnit1 ? (mImg&&mImg2&&mRes&&Object.keys(mRes).length===mtQs.length) : (mImg&&mRes&&Object.keys(mRes).length===mtQs.length);

  // ── RENDER ──────────────────────────────────────────────────
  const tabs=[{id:"final",label:"Final"},{id:"acronym",label:"약어"},{id:"matching",label:"매칭"},{id:"roster",label:"성적표"}];

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:70}}>

      {/* TOPBAR */}
      <div style={{background:C.blue,padding:"0 10px",display:"flex",alignItems:"center",gap:6,height:52,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.15)"}}>
        <span style={{fontWeight:800,fontSize:16,color:"#fff",marginRight:4}}>ELT</span>
        <div style={{display:"flex",gap:4,flex:1}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>{setTab(t.id);setShowSet(false);}} style={{flex:1,padding:"6px 4px",borderRadius:7,border:tab===t.id?"none":"1.5px solid rgba(255,255,255,.4)",background:tab===t.id?"#fff":"transparent",color:tab===t.id?C.blue:"#fff",cursor:"pointer",fontSize:13,fontWeight:800,position:"relative"}}>
              {t.label}
              {t.id==="roster"&&roster.length>0&&<span style={{position:"absolute",top:-5,right:-3,background:C.red,color:"#fff",borderRadius:99,fontSize:9,fontWeight:800,padding:"1px 4px"}}>{roster.length}</span>}
            </button>
          ))}
        </div>
        <button onClick={()=>setShowSet(v=>!v)} style={{width:36,height:36,borderRadius:8,border:`2px solid ${showSet?"#fff":"rgba(255,255,255,.4)"}`,background:showSet?"rgba(255,255,255,.2)":"transparent",color:"#fff",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>⚙</button>
      </div>

      {/* SETTINGS */}
      {showSet&&<>
        <div style={{position:"fixed",inset:0,zIndex:150}} onClick={()=>setShowSet(false)}/>
        <div style={{position:"fixed",top:58,right:10,width:290,background:C.white,border:`1px solid ${C.border}`,borderRadius:14,padding:18,zIndex:200,boxShadow:"0 8px 30px rgba(0,0,0,.12)",animation:"fadeIn .15s ease"}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:12}}>⚙ 설정</div>
          <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:7}}>Anthropic API 키</div>
          {apiKey?(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1,background:C.greenL,border:"2px solid #9ae6b4",borderRadius:8,padding:"7px 10px",fontSize:11,color:C.greenD,fontWeight:700,wordBreak:"break-all"}}>{showKey?apiKey:"sk-ant-••••••••••••••••"}</div>
                <button onClick={()=>setShowKey(v=>!v)} style={{padding:"5px 9px",borderRadius:7,border:`2px solid ${C.border}`,background:C.white,color:C.muted,cursor:"pointer",fontSize:12,fontWeight:700}}>{showKey?"숨기기":"보기"}</button>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:C.green,fontWeight:700}}>✓ 저장됨</span>
                <button onClick={clearKey} style={{padding:"4px 10px",borderRadius:7,border:"2px solid #fed7d7",background:C.redL,color:C.redD,cursor:"pointer",fontSize:12,fontWeight:700}}>삭제</button>
              </div>
            </div>
          ):(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:6}}>
                <input style={{...inp,flex:1,fontSize:13}} type="password" value={apiInp} onChange={e=>setApiInp(e.target.value)} placeholder="sk-ant-api03-..." onKeyDown={e=>e.key==="Enter"&&saveKey()}/>
                <button onClick={saveKey} style={{padding:"9px 12px",borderRadius:9,border:"none",background:C.blue,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:800,whiteSpace:"nowrap"}}>저장</button>
              </div>
              {apiOk&&<div style={{fontSize:13,color:C.green,fontWeight:700}}>✓ 저장됐어요!</div>}
              <div style={{fontSize:11,color:C.muted,marginTop:5,lineHeight:1.6}}>브라우저에만 저장.<br/>발급: console.anthropic.com → API Keys</div>
            </div>
          )}
        </div>
      </>}

      {!apiKey&&(
        <div style={{background:C.yellowL,borderBottom:"2px solid #f6c90e",padding:"9px 14px",fontSize:14,fontWeight:700,color:"#744210",display:"flex",alignItems:"center",gap:8}}>
          ⚠ API 키가 필요해요.
          <button onClick={()=>setShowSet(true)} style={{marginLeft:"auto",padding:"5px 12px",borderRadius:8,border:"2px solid #f6c90e",background:C.white,color:"#744210",cursor:"pointer",fontSize:13,fontWeight:800}}>⚙ 설정</button>
        </div>
      )}

      {/* ══════════════════════════════════════════════
          FINAL TEST TAB
      ══════════════════════════════════════════════ */}
      {tab==="final"&&(
        <div style={{padding:"14px 12px"}}>
          <div style={card}>
            <SH label="학생 정보"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>폼 선택</div>
                <select style={inp} value={fForm} onChange={e=>setFForm(e.target.value)}>
                  {Object.entries(FINAL_LABELS).map(([k,v])=><option key={k} value={k}>{v} ({k})</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>이름</div>
                <input style={inp} value={fName} onChange={e=>setFName(e.target.value)} placeholder="자동 인식"/>
              </div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>군번 SN</div>
            <input style={inp} value={fSn} onChange={e=>setFSn(e.target.value)} placeholder="자동 인식"/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <input type="file" accept="image/*" capture="environment" ref={fRef1} style={{display:"none"}} onChange={e=>e.target.files[0]&&fHP1(e.target.files[0])}/>
              <PhotoBox img={fImg1} loading={fLd1} count={Object.keys(fExt.A||{}).length+Object.keys(fExt.B||{}).length} label="1장 — A·B" sub="번호+약어 1~50" onTap={()=>fRef1.current.click()} err={fEr1}/>
            </div>
            <div>
              <input type="file" accept="image/*" capture="environment" ref={fRef2} style={{display:"none"}} onChange={e=>e.target.files[0]&&fHP2(e.target.files[0])}/>
              <PhotoBox img={fImg2} loading={fLd2} count={Object.keys(fExt.C||{}).length+Object.keys(fExt.D||{}).length} label="2장 — C·D" sub="T/F+빈칸 51~100" onTap={()=>fRef2.current.click()} err={fEr2}/>
            </div>
          </div>

          {fCanGrade&&!fRes&&(
            <button onClick={runFinal} style={{background:C.green,color:"#fff",border:"none",borderRadius:10,padding:"15px",fontSize:17,fontWeight:800,cursor:"pointer",width:"100%",marginBottom:12}}>채점 실행 →</button>
          )}

          {fRes&&(<>
            <ScoreHeader score={fSc} total={100} name={fName} sn={fSn} subtitle={`${FINAL_LABELS[fForm]} (${fForm})`} rl={fRl} lowConf={Object.values(fRes||{}).filter(r=>r.result==="correct"&&r.confidence!==undefined&&r.confidence<0.75&&fOv[Object.keys(fRes).find(k=>fRes[k]===r)]===undefined).length} onSave={saveFinal} onReset={resetFinal}/>
            {[{label:"섹션 A — 번호 찾기",r:[1,25]},{label:"섹션 B — 약어 원형",r:[26,50]},{label:"섹션 C — 참/거짓 (AI 인식 확인)",r:[51,80]},{label:"섹션 D — 빈칸 채우기",r:[81,100]}].map(({label,r:rng})=>{
              const qs=Array.from({length:rng[1]-rng[0]+1},(_,i)=>i+rng[0]);
              const cor=qs.filter(q=>(fOv[q]!==undefined?fOv[q]:fRes[q].result==="correct")).length;
              const rev=qs.filter(q=>fOv[q]===undefined&&fRes[q].result==="review").length;
              const isSecC=rng[0]===51;
              // 섹션C: AI 읽은 답 확인 배너
              const cNote=isSecC?<div style={{fontSize:12,color:"#553c9a",fontWeight:700,background:"#faf5ff",border:"1px solid #e9d8fd",borderRadius:7,padding:"6px 10px",marginBottom:8}}>👁 AI가 읽은 학생 답안(T/F)을 확인하고 잘못된 경우 O/X로 수정해주세요</div>:null;
              return(
                <div key={label} style={card}>
                  <SH label={label} right={{correct:cor,total:qs.length,rev}}/>
                  {cNote}
                  {isSecC?(
                    // 섹션 C: 2열 그리드로 공간 절약
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                      {qs.map(q=>{
                        const r=fRes[q];
                        return<CRow key={q} q={q} student={r.student} correct={r.correct} result={r.result} ov={fOv[q]} onOv={v=>{if(v===undefined){setFOv(p=>{const n={...p};delete n[q];return n;});}else setFOv(p=>({...p,[q]:v}));}}/>;
                      })}
                    </div>
                  ):(
                    qs.map(q=>{
                      const r=fRes[q];
                      const cs=r.sec==="B"?`${r.correct[0]} / ${r.correct[1]}`:String(r.correct);
                      return<RRow key={q} q={q} student={r.student} correct={r.correct} correctStr={cs} result={r.result} ov={fOv[q]} confidence={r.confidence} onOv={v=>{if(v===undefined){setFOv(p=>{const n={...p};delete n[q];return n;});}else setFOv(p=>({...p,[q]:v}));}}/>;
                    })
                  )}
                </div>
              );
            })}
            <button onClick={saveFinal} disabled={fRl>0} style={{background:fRl>0?"#cbd5e0":C.blue,color:"#fff",border:"none",borderRadius:10,padding:"15px",fontSize:16,fontWeight:800,cursor:fRl>0?"not-allowed":"pointer",width:"100%",opacity:fRl>0?.5:1}}>
              {fRl>0?`⚠ 검토 ${fRl}문항 남음`:`성적표에 저장 (${fSc}점)`}
            </button>
          </>)}
        </div>
      )}

      {/* ══════════════════════════════════════════════
          ACRONYM QUIZ TAB
      ══════════════════════════════════════════════ */}
      {tab==="acronym"&&(
        <div style={{padding:"14px 12px"}}>
          <div style={card}>
            <SH label="약어 시험 설정"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>폼</div>
                <select style={inp} value={aForm} onChange={e=>{setAForm(e.target.value);setARes(null);setAImg(null);}}>
                  {["A","B","C","D"].map(f=><option key={f} value={f}>Form {f}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>Day</div>
                <select style={inp} value={aDay} onChange={e=>{setADay(e.target.value);setARes(null);setAImg(null);}}>
                  {["Day2","Day3","Day4"].map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>이름</div>
                <input style={inp} value={aNm} onChange={e=>setANm(e.target.value)} placeholder="이름"/>
              </div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>군번 SN</div>
            <input style={inp} value={aSn} onChange={e=>setASn(e.target.value)} placeholder="군번"/>
            <div style={{fontSize:12,color:C.muted,marginTop:8,padding:"6px 10px",background:"#f7fafc",borderRadius:8,border:`1px solid ${C.border}`}}>
              📝 Form {aForm} {aDay} — {acQs.length}문항
            </div>
          </div>

          <input type="file" accept="image/*" capture="environment" ref={aRef} style={{display:"none"}} onChange={e=>e.target.files[0]&&aHP(e.target.files[0])}/>
          <PhotoBox img={aImg} loading={aLd} count={aRes?Object.keys(aRes).length:0} label="답안지 촬영" sub={`약어 ${acQs.length}문항`} onTap={()=>aRef.current.click()} err={aEr}/>

          {aRes&&(<>
            <ScoreHeader score={aSc} total={acQs.length} name={aNm} sn={aSn} subtitle={`Form ${aForm} ${aDay}`} rl={aRl} lowConf={acQs.filter(q=>aRes[q.no]?.result==="correct"&&aRes[q.no]?.confidence<0.75&&aOv[q.no]===undefined).length} onSave={saveAcronym} onReset={resetAcronym}/>
            <div style={card}>
              <SH label="채점 결과" right={{correct:aSc,total:acQs.length,rev:aRl}}/>
              {acQs.map(q=>{
                const r=aRes[q.no];
                return<RRow key={q.no} q={q.no} student={r?.student||""} correctStr={`${q.full} / ${q.kor}`} result={r?.result||"wrong"} ov={aOv[q.no]} confidence={r?.confidence} onOv={v=>{if(v===undefined){setAOv(p=>{const n={...p};delete n[q.no];return n;});}else setAOv(p=>({...p,[q.no]:v}));}}/>;
              })}
            </div>
            <button onClick={saveAcronym} disabled={aRl>0} style={{background:aRl>0?"#cbd5e0":C.blue,color:"#fff",border:"none",borderRadius:10,padding:"15px",fontSize:16,fontWeight:800,cursor:aRl>0?"not-allowed":"pointer",width:"100%",opacity:aRl>0?.5:1}}>
              {aRl>0?`⚠ 검토 ${aRl}문항 남음`:`성적표에 저장 (${aSc}/${acQs.length}점)`}
            </button>
          </>)}
        </div>
      )}

      {/* ══════════════════════════════════════════════
          MATCHING QUIZ TAB
      ══════════════════════════════════════════════ */}
      {tab==="matching"&&(
        <div style={{padding:"14px 12px"}}>
          <div style={card}>
            <SH label="매칭 시험 설정"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>Unit</div>
                <select style={inp} value={mUnit} onChange={e=>{setMUnit(e.target.value);setMRes(null);setMImg(null);}}>
                  {["Unit1","Unit2","Unit3"].map(u=><option key={u} value={u}>{u.replace("Unit","Unit ")} ({MATCHING_KEYS[u].length}문항)</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>이름</div>
                <input style={inp} value={mNm} onChange={e=>setMNm(e.target.value)} placeholder="이름"/>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:6}}>군번 SN</div>
                <input style={inp} value={mSn} onChange={e=>setMSn(e.target.value)} placeholder="군번"/>
              </div>
            </div>
            <div style={{fontSize:12,color:C.muted,padding:"6px 10px",background:"#f7fafc",borderRadius:8,border:`1px solid ${C.border}`}}>
              📝 {mUnit.replace("Unit","Unit ")} — {mtQs.length}문항 / 정의 보고 번호 적기
            </div>
          </div>

          {/* Unit1: 2장, Unit2/3: 1장 */}
          <input type="file" accept="image/*" capture="environment" ref={mRef} style={{display:"none"}} onChange={e=>e.target.files[0]&&mHP(e.target.files[0],1)}/>
          {isUnit1?(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <PhotoBox img={mImg} loading={mLd} count={mImg&&mRes?Object.keys(mRes).filter(k=>parseInt(k)<=30).length:0} label="1장 (1~30번)" sub="앞면 촬영" onTap={()=>mRef.current.click()} err={mEr}/>
              <div>
                <input type="file" accept="image/*" capture="environment" ref={mRef2} style={{display:"none"}} onChange={e=>e.target.files[0]&&mHP(e.target.files[0],2)}/>
                <PhotoBox img={mImg2} loading={mLd2} count={mImg2&&mRes?Object.keys(mRes).filter(k=>parseInt(k)>30).length:0} label="2장 (31~59번)" sub="뒷면 촬영" onTap={()=>mRef2.current.click()} err={mEr2}/>
              </div>
            </div>
          ):(
            <PhotoBox img={mImg} loading={mLd} count={mRes?Object.keys(mRes).length:0} label="답안지 촬영" sub={`매칭 ${mtQs.length}문항`} onTap={()=>mRef.current.click()} err={mEr}/>
          )}

          {mCanSave&&(<>
            <ScoreHeader score={mSc} total={mtQs.length} name={mNm} sn={mSn} subtitle={mUnit.replace("Unit","Unit ")} rl={mRl} onSave={saveMatching} onReset={resetMatching}/>
            <div style={card}>
              <SH label="채점 결과" right={{correct:mSc,total:mtQs.length,rev:mRl}}/>
              {mtQs.map(q=>{
                const r=mRes[q.no];
                return<RRow key={q.no} q={q.no} student={r?.student||""} correctStr={`${q.answer} (${q.term})`} result={r?.result||"wrong"} ov={mOv[q.no]} onOv={v=>{if(v===undefined){setMOv(p=>{const n={...p};delete n[q.no];return n;});}else setMOv(p=>({...p,[q.no]:v}));}}/>;
              })}
            </div>
            <button onClick={saveMatching} disabled={mRl>0} style={{background:mRl>0?"#cbd5e0":C.blue,color:"#fff",border:"none",borderRadius:10,padding:"15px",fontSize:16,fontWeight:800,cursor:mRl>0?"not-allowed":"pointer",width:"100%",opacity:mRl>0?.5:1}}>
              {mRl>0?`⚠ 검토 ${mRl}문항 남음`:`성적표에 저장 (${mSc}/${mtQs.length}점)`}
            </button>
          </>)}
        </div>
      )}

      {/* ══════════════════════════════════════════════
          ROSTER TAB
      ══════════════════════════════════════════════ */}
      {tab==="roster"&&(
        <div style={{padding:"14px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:18,color:C.text}}>성적표 <span style={{color:C.muted,fontSize:15,fontWeight:600}}>({roster.length}명)</span></div>
            {roster.length>0&&(
              <button onClick={()=>{if(window.confirm("성적표를 전체 초기화할까요?\n이 작업은 되돌릴 수 없습니다."))setRoster([]);}}
                style={{padding:"7px 14px",borderRadius:8,border:`2px solid #fed7d7`,background:C.redL,color:C.redD,cursor:"pointer",fontSize:13,fontWeight:800}}>
                🗑 초기화
              </button>
            )}
          </div>
          {roster.length===0?(
            <div style={{textAlign:"center",padding:"60px 0",color:C.muted}}>
              <div style={{fontSize:40,marginBottom:10}}>📋</div>
              <div style={{fontSize:15,fontWeight:600}}>아직 채점된 학생이 없어요</div>
            </div>
          ):(
            <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#f7fafc"}}>
                    {["#","이름","군번","시험","점수","등급","시각"].map(h=>(
                      <th key={h} style={{padding:"10px 8px",textAlign:h==="점수"||h==="등급"?"center":"left",fontSize:12,fontWeight:800,color:C.muted,borderBottom:`2px solid ${C.border}`}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {roster.map((r,i)=>{
                    const pct=r.score/r.total;
                    const gc=pct>=0.8?C.greenD:pct>=0.6?C.yellow:C.redD;
                    const gbg=pct>=0.8?C.greenL:pct>=0.6?C.yellowL:C.redL;
                    const gl=pct>=0.9?"A":pct>=0.8?"B":pct>=0.7?"C":pct>=0.6?"D":"F";
                    return(
                      <tr key={i} style={{borderTop:`1px solid ${C.border}`}}>
                        <td style={{padding:"10px 8px",color:C.muted,fontSize:13,fontWeight:700}}>{i+1}</td>
                        <td style={{padding:"10px 8px",fontWeight:800,fontSize:14,color:C.text}}>{r.name}</td>
                        <td style={{padding:"10px 8px",color:C.muted,fontSize:12,fontWeight:600}}>{r.sn}</td>
                        <td style={{padding:"10px 8px",fontSize:11,fontWeight:700}}>
                          <span style={{padding:"2px 7px",borderRadius:99,background:r.type==="Final"?"#ebf4ff":r.type==="약어"?"#faf5ff":"#f0fff4",color:r.type==="Final"?C.blue:r.type==="약어"?"#553c9a":C.greenD,border:`1px solid ${r.type==="Final"?"#bfdbfe":r.type==="약어"?"#e9d8fd":"#9ae6b4"}`}}>
                            {r.type}
                          </span>
                          <div style={{fontSize:11,color:C.muted,marginTop:3}}>{r.subtitle}</div>
                        </td>
                        <td style={{padding:"10px 8px",textAlign:"center"}}><span style={{fontSize:18,fontWeight:900,color:gc}}>{r.score}<span style={{fontSize:11,fontWeight:600,color:C.muted}}>/{r.total}</span></span></td>
                        <td style={{padding:"10px 8px",textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:99,fontSize:12,fontWeight:800,background:gbg,color:gc,border:`2px solid ${gc}`}}>{gl}</span></td>
                        <td style={{padding:"10px 8px",color:C.muted,fontSize:11,fontWeight:600}}>{r.time}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
