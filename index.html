function norm(s){ return (s||"").toLowerCase().replace(/[^a-z0-9가-힣\s]/g," ").replace(/\s+/g," ").trim(); }
function overlap(a,b){ const wa=new Set(norm(a).split(" ").filter(Boolean)),wb=norm(b).split(" ").filter(Boolean); if(!wa.size||!wb.length)return 0; return wb.filter(w=>wa.has(w)).length/Math.max(wa.size,wb.length); }
function gradeQ(student,correct,sec){
  if(sec==="A") return parseInt(student)===parseInt(correct)?"correct":"wrong";
  if(sec==="C") return (student||"").toUpperCase().trim()===correct?"correct":"wrong";
  if(sec==="B"){
    const[eng,kor]=correct,parts=(student||"").split("|");
    const eok=overlap((parts[0]||"").trim(),eng)>=0.65,kok=overlap((parts[1]||"").trim(),kor)>=0.65;
    if(eok&&kok)return"correct"; if(eok||kok)return"review";
    if(overlap(student||"",eng)>=0.4||overlap(student||"",kor)>=0.4)return"review";
    return"wrong";
  }
  if(sec==="D"){ const v=overlap(student||"",correct); if(v>=0.6)return"correct"; if(v>=0.3)return"review"; return"wrong"; }
  return"wrong";
}

    return JSON.parse((d.content?.find(b=>b.type==="text")?.text||"{}").replace(/```json|```/g,"").trim());
  }

  async function hp1(file){
    if(!apiKey){setEr1("⚙ 설정에서 API 키를 먼저 입력해주세요");return;}
    setEr1("");setLd1(true);
    const b=await toB64(file);setImg1(b);
    try{const d=await callV(b,P1);if(d.name&&!nm)setNm(d.name);if(d.sn&&!sn)setSni(d.sn);setExt(p=>({...p,A:d.A||{},B:d.B||{}}));}
    catch(e){setEr1("인식 실패: "+e.message);setImg1(null);}
    setLd1(false);
  }
  function setSni(v){setSn(v);}

  async function hp2(file){
    if(!apiKey){setEr2("⚙ 설정에서 API 키를 먼저 입력해주세요");return;}
    setEr2("");setLd2(true);
    const b=await toB64(file);setImg2(b);
    try{const d=await callV(b,P2);setExt(p=>({...p,C:d.C||{},D:d.D||{}}));}
    catch(e){setEr2("인식 실패: "+e.message);setImg2(null);}
    setLd2(false);
  }

  function runGrade(){
    const k=AK[form],r={};
    for(let i=1;i<=25;i++)  r[i]={sec:"A",student:ext.A?.[i]||"",correct:k.A[i],result:gradeQ(ext.A?.[i],k.A[i],"A")};
    for(let i=26;i<=50;i++) r[i]={sec:"B",student:ext.B?.[i]||"",correct:k.B[i],result:gradeQ(ext.B?.[i],k.B[i],"B")};
    for(let i=51;i<=80;i++) r[i]={sec:"C",student:ext.C?.[i]||"",correct:k.C[i],result:gradeQ(ext.C?.[i],k.C[i],"C")};
    for(let i=81;i<=100;i++)r[i]={sec:"D",student:ext.D?.[i]||"",correct:k.D[i],result:gradeQ(ext.D?.[i],k.D[i],"D")};
    setRes(r);setOv({});
  }

  function calcSc(r,o){if(!r)return 0;let s=0;for(let i=1;i<=100;i++){const f=o[i]!==undefined?(o[i]?"correct":"wrong"):r[i].result;if(f==="correct")s++;}return s;}
  function rleft(){if(!res)return 0;return Object.entries(res).filter(([q,r])=>ov[q]===undefined&&r.result==="review").length;}

  function saveR(){
    const sc=calcSc(res,ov);
    setRoster(p=>[...p,{name:nm,sn,form,score:sc,time:new Date().toLocaleTimeString("ko-KR")}]);
    setNm("");setSn("");setImg1(null);setImg2(null);setExt({});setRes(null);setOv({});
  }
  function reset(){setNm("");setSn("");setImg1(null);setImg2(null);setExt({});setRes(null);setOv({});setEr1("");setEr2("");}

  const sc=calcSc(res,ov),rl=rleft();
  const canG=ext.A&&Object.keys(ext.A).length>0&&ext.C&&Object.keys(ext.C).length>0;
  const scCol=sc>=80?"#276749":sc>=60?"#b7791f":"#c53030";
  const scBg=sc>=80?"#f0fff4":sc>=60?"#fffbeb":"#fff5f5";
  const scBd=sc>=80?"#9ae6b4":sc>=60?"#f6e05e":"#feb2b2";

  const inp={background:"#f7fafc",border:"2px solid #e2e8f0",borderRadius:10,color:"#1a202c",padding:"11px 12px",fontSize:15,fontWeight:600,width:"100%",outline:"none"};
  const card={background:"#ffffff",borderRadius:14,border:"1px solid #e2e8f0",padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,.06)"};

  function PBox({has,loading,img,count,label,onTap,err}){
    return(
      <div style={card}>
        <div style={{fontSize:14,fontWeight:800,color:"#1a202c",paddingBottom:10,borderBottom:"2px solid #e2e8f0",marginBottom:12}}>{label}</div>
        <div onClick={onTap} style={{border:`2.5px dashed ${has?"#38a169":"#a0aec0"}`,borderRadius:12,padding:14,textAlign:"center",cursor:"pointer",background:has?"#f0fff4":"#f7fafc",minHeight:120,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading?<><div style={{fontSize:26,animation:"spin 1s linear infinite"}}>⚙️</div><div style={{fontSize:14,fontWeight:700,color:"#718096"}}>인식 중...</div></>
          :img?<><img src={img} style={{maxHeight:70,borderRadius:8,maxWidth:"100%"}}/><div style={{fontSize:13,fontWeight:800,color:"#276749"}}>✓ {count}문항 인식</div><div style={{fontSize:12,color:"#1a56db",fontWeight:700}}>탭하여 재촬영</div></>
          :<><div style={{fontSize:34}}>📷</div><div style={{fontSize:15,color:"#1a56db",fontWeight:800}}>촬영하기</div></>}
        </div>
        {err&&<div style={{fontSize:13,fontWeight:700,color:"#c53030",marginTop:8,padding:"7px 10px",background:"#fff5f5",border:"1px solid #feb2b2",borderRadius:8}}>{err}</div>}
      </div>
    );
  }

  function RRow({q,r,o,onO}){
    const fin=o!==undefined?(o?"correct":"wrong"):r.result;
    const bg=fin==="correct"?"transparent":fin==="review"?"#fffbeb":"#fff5f5";
    const bd=fin==="correct"?"#e2e8f0":fin==="review"?"#f6e05e":"#feb2b2";
    const tc=fin==="correct"?"#276749":fin==="review"?"#b7791f":"#c53030";
    const cs=r.sec==="B"?`${r.correct[0]} / ${r.correct[1]}`:String(r.correct);
    return(
      <div style={{display:"grid",gridTemplateColumns:"28px 1fr auto",gap:8,alignItems:"start",padding:"8px 10px",borderRadius:8,marginBottom:4,background:bg,border:`1.5px solid ${bd}`}}>
        <span style={{fontSize:13,color:"#718096",fontWeight:800,paddingTop:2}}>{q}.</span>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:tc,wordBreak:"break-all"}}>{r.student||<em style={{color:"#a0aec0",fontWeight:400}}>미입력</em>}</div>
          {fin!=="correct"&&<div style={{fontSize:12,color:"#718096",marginTop:3}}>정답: <span style={{color:"#1a56db",fontWeight:700}}>{cs}</span></div>}
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {(r.result==="review"||o!==undefined)&&<>
            <button onClick={()=>onO(true)}  style={{width:34,height:30,borderRadius:7,border:`2px solid ${o===true?"#38a169":"#e2e8f0"}`,background:o===true?"#f0fff4":"#fff",color:o===true?"#276749":"#a0aec0",cursor:"pointer",fontSize:15,fontWeight:800}}>O</button>
            <button onClick={()=>onO(false)} style={{width:34,height:30,borderRadius:7,border:`2px solid ${o===false?"#e53e3e":"#e2e8f0"}`,background:o===false?"#fff5f5":"#fff",color:o===false?"#c53030":"#a0aec0",cursor:"pointer",fontSize:15,fontWeight:800}}>X</button>
          </>}
          <span style={{fontSize:14,minWidth:20,textAlign:"center"}}>{fin==="correct"?"✅":fin==="review"?"⚠️":"❌"}</span>
        </div>
      </div>
    );
  }

  return(
    <div style={{background:"#f0f4f8",minHeight:"100vh",paddingBottom:70}}>

      {/* TOPBAR */}
      <div style={{background:"#1a56db",padding:"0 14px",display:"flex",alignItems:"center",gap:10,height:56,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.15)"}}>
        <span style={{fontWeight:800,fontSize:18,color:"#fff"}}>ELT GRADER</span>
        <div style={{flex:1}}/>
        {["grade","roster"].map(t=>(
          <button key={t} onClick={()=>{setTab(t);setShowSet(false);}} style={{padding:"7px 16px",borderRadius:8,border:tab===t?"none":"2px solid rgba(255,255,255,.5)",background:tab===t?"#fff":"transparent",color:tab===t?"#1a56db":"#fff",cursor:"pointer",fontSize:15,fontWeight:800,position:"relative"}}>
            {t==="grade"?"채점":"성적표"}
            {t==="roster"&&roster.length>0&&<span style={{position:"absolute",top:-6,right:-6,background:"#e53e3e",color:"#fff",borderRadius:99,fontSize:10,fontWeight:800,padding:"1px 5px"}}>{roster.length}</span>}
          </button>
        ))}
        <button onClick={()=>setShowSet(v=>!v)} style={{width:40,height:40,borderRadius:9,border:`2px solid ${showSet?"#fff":"rgba(255,255,255,.5)"}`,background:showSet?"rgba(255,255,255,.2)":"transparent",color:"#fff",cursor:"pointer",fontSize:19,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
      </div>

      {/* SETTINGS */}
      {showSet&&<>
        <div style={{position:"fixed",inset:0,zIndex:150}} onClick={()=>setShowSet(false)}/>
        <div style={{position:"fixed",top:62,right:10,width:300,background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:18,zIndex:200,boxShadow:"0 8px 30px rgba(0,0,0,.12)",animation:"fadeIn .15s ease"}}>
          <div style={{fontSize:14,fontWeight:800,color:"#1a202c",marginBottom:12}}>⚙ 설정</div>
          <div style={{fontSize:13,fontWeight:700,color:"#718096",marginBottom:7}}>Anthropic API 키</div>
          {apiKey?(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1,background:"#f0fff4",border:"2px solid #9ae6b4",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#276749",fontWeight:700,wordBreak:"break-all"}}>{showKey?apiKey:"sk-ant-••••••••••••••••"}</div>
                <button onClick={()=>setShowKey(v=>!v)} style={{padding:"6px 10px",borderRadius:8,border:"2px solid #e2e8f0",background:"#fff",color:"#718096",cursor:"pointer",fontSize:13,fontWeight:700}}>{showKey?"숨기기":"보기"}</button>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:"#38a169",fontWeight:700}}>✓ 저장됨</span>
                <button onClick={clearKey} style={{padding:"5px 12px",borderRadius:7,border:"2px solid #fed7d7",background:"#fff5f5",color:"#c53030",cursor:"pointer",fontSize:13,fontWeight:700}}>삭제</button>
              </div>
            </div>
          ):(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:6}}>
                <input style={{...inp,flex:1,fontSize:13}} type="password" value={apiInp} onChange={e=>setApiInp(e.target.value)} placeholder="sk-ant-api03-..." onKeyDown={e=>e.key==="Enter"&&saveKey()}/>
                <button onClick={saveKey} style={{padding:"10px 14px",borderRadius:9,border:"none",background:"#1a56db",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:800,whiteSpace:"nowrap"}}>저장</button>
              </div>
              {apiOk&&<div style={{fontSize:13,color:"#38a169",fontWeight:700}}>✓ 저장됐어요!</div>}
              <div style={{fontSize:12,color:"#718096",marginTop:6,lineHeight:1.6}}>브라우저에만 저장돼요.<br/>발급: console.anthropic.com → API Keys</div>
            </div>
          )}
        </div>
      </>}

      {!apiKey&&(
        <div style={{background:"#fffbeb",borderBottom:"2px solid #f6c90e",padding:"10px 14px",fontSize:14,fontWeight:700,color:"#744210",display:"flex",alignItems:"center",gap:8}}>
          ⚠ API 키가 필요해요.
          <button onClick={()=>setShowSet(true)} style={{marginLeft:"auto",padding:"6px 14px",borderRadius:8,border:"2px solid #f6c90e",background:"#fff",color:"#744210",cursor:"pointer",fontSize:13,fontWeight:800}}>⚙ 설정</button>
        </div>
      )}

      {/* GRADE TAB */}
      {tab==="grade"&&(
        <div style={{padding:"14px 12px"}}>

          <div style={card}>
            <div style={{fontSize:14,fontWeight:800,color:"#1a202c",paddingBottom:10,borderBottom:"2px solid #e2e8f0",marginBottom:14}}>학생 정보</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#718096",marginBottom:6}}>폼 선택</div>
                <select style={inp} value={form} onChange={e=>setForm(e.target.value)}>
                  {Object.entries(FL).map(([k,v])=><option key={k} value={k}>{v} ({k})</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#718096",marginBottom:6}}>이름</div>
                <input style={inp} value={nm} onChange={e=>setNm(e.target.value)} placeholder="자동 인식"/>
              </div>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#718096",marginBottom:6}}>군번 SN</div>
              <input style={inp} value={sn} onChange={e=>setSn(e.target.value)} placeholder="자동 인식"/>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <input type="file" accept="image/*" capture="environment" ref={rf1} style={{display:"none"}} onChange={e=>e.target.files[0]&&hp1(e.target.files[0])}/>
              <PBox has={!!img1} loading={ld1} img={img1} count={Object.keys(ext.A||{}).length+Object.keys(ext.B||{}).length} label="1장 — A·B" onTap={()=>rf1.current.click()} err={er1}/>
            </div>
            <div>
              <input type="file" accept="image/*" capture="environment" ref={rf2} style={{display:"none"}} onChange={e=>e.target.files[0]&&hp2(e.target.files[0])}/>
              <PBox has={!!img2} loading={ld2} img={img2} count={Object.keys(ext.C||{}).length+Object.keys(ext.D||{}).length} label="2장 — C·D" onTap={()=>rf2.current.click()} err={er2}/>
            </div>
          </div>

          {canG&&!res&&(
            <button onClick={runGrade} style={{background:"#38a169",color:"#fff",border:"none",borderRadius:10,padding:"15px",fontSize:17,fontWeight:800,cursor:"pointer",width:"100%",marginBottom:12}}>채점 실행 →</button>
          )}

          {res&&(<>
            <div style={{...card,background:scBg,border:`2px solid ${scBd}`,display:"flex",alignItems:"center",gap:14}}>
              <div style={{textAlign:"center",minWidth:76}}>
                <div style={{fontSize:54,fontWeight:900,lineHeight:1,color:scCol}}>{sc}</div>
                <div style={{fontSize:13,fontWeight:700,color:"#718096",marginTop:3}}>/ 100점</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:17,color:"#1a202c"}}>{nm||"이름 없음"} <span style={{color:"#718096",fontWeight:600,fontSize:14}}>{sn}</span></div>
                <div style={{fontSize:13,fontWeight:700,color:"#718096",marginTop:4}}>{FL[form]} ({form})</div>
                {rl>0&&<div style={{marginTop:8,fontSize:13,fontWeight:700,color:"#744210",background:"#fffbeb",border:"2px solid #f6c90e",borderRadius:8,padding:"6px 10px"}}>⚠ 검토 {rl}문항 — O/X 후 저장</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <button onClick={saveR} disabled={rl>0} style={{padding:"10px 14px",borderRadius:9,border:"none",background:rl>0?"#cbd5e0":"#1a56db",color:"#fff",cursor:rl>0?"not-allowed":"pointer",fontSize:14,fontWeight:800,whiteSpace:"nowrap"}}>저장 →</button>
                <button onClick={reset} style={{padding:"8px 10px",borderRadius:9,border:"2px solid #e2e8f0",background:"#fff",color:"#718096",cursor:"pointer",fontSize:13,fontWeight:700}}>초기화</button>
              </div>
            </div>

            {[{label:"섹션 A — 번호 찾기",r:[1,25]},{label:"섹션 B — 약어 원형",r:[26,50]},{label:"섹션 C — 참/거짓",r:[51,80]},{label:"섹션 D — 빈칸 채우기",r:[81,100]}].map(({label,r:rng})=>{
              const qs=Array.from({length:rng[1]-rng[0]+1},(_,i)=>i+rng[0]);
              const cor=qs.filter(q=>(ov[q]!==undefined?ov[q]:res[q].result==="correct")).length;
              const rv=qs.filter(q=>ov[q]===undefined&&res[q].result==="review").length;
              return(
                <div key={label} style={card}>
                  <div style={{fontSize:14,fontWeight:800,color:"#1a202c",paddingBottom:10,borderBottom:"2px solid #e2e8f0",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>{label}</span>
                    <span style={{color:rv>0?"#b7791f":"#276749",fontWeight:800}}>{cor}/{qs.length}{rv>0?` (검토 ${rv})`:" ✓"}</span>
                  </div>
                  {qs.map(q=><RRow key={q} q={q} r={res[q]} o={ov[q]} onO={v=>setOv(p=>({...p,[q]:v}))}/>)}
                </div>
              );
            })}

            <button onClick={saveR} disabled={rl>0} style={{background:rl>0?"#cbd5e0":"#1a56db",color:"#fff",border:"none",borderRadius:10,padding:"15px",fontSize:16,fontWeight:800,cursor:rl>0?"not-allowed":"pointer",width:"100%",opacity:rl>0?.5:1}}>
              {rl>0?`⚠ 검토 ${rl}문항 남음`:`성적표에 저장 (${sc}점)`}
            </button>
          </>)}
        </div>
      )}

      {/* ROSTER TAB */}
      {tab==="roster"&&(
        <div style={{padding:"14px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:18,color:"#1a202c"}}>성적표 <span style={{color:"#718096",fontSize:15,fontWeight:600}}>({roster.length}명)</span></div>
            {roster.length>0&&<div style={{fontSize:13,fontWeight:700,color:"#718096",display:"flex",gap:12}}>
              <span>평균 <strong style={{color:"#1a202c"}}>{(roster.reduce((s,r)=>s+r.score,0)/roster.length).toFixed(1)}</strong></span>
              <span>최고 <strong style={{color:"#276749"}}>{Math.max(...roster.map(r=>r.score))}</strong></span>
              <span>최저 <strong style={{color:"#c53030"}}>{Math.min(...roster.map(r=>r.score))}</strong></span>
            </div>}
          </div>
          {roster.length===0?(
            <div style={{textAlign:"center",padding:"60px 0",color:"#a0aec0"}}>
              <div style={{fontSize:40,marginBottom:10}}>📋</div>
              <div style={{fontSize:15,fontWeight:600}}>아직 채점된 학생이 없어요</div>
            </div>
          ):(
            <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#f7fafc"}}>
                    {["순위","이름","군번","폼","점수","등급","시각"].map(h=>(
                      <th key={h} style={{padding:"11px 10px",textAlign:h==="점수"||h==="등급"?"center":"left",fontSize:13,fontWeight:800,color:"#718096",borderBottom:"2px solid #e2e8f0"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...roster].sort((a,b)=>b.score-a.score).map((r,i)=>{
                    const g=r.score>=90?"A":r.score>=80?"B":r.score>=70?"C":r.score>=60?"D":"F";
                    const gc=r.score>=80?"#276749":r.score>=60?"#b7791f":"#c53030";
                    const gbg=r.score>=80?"#f0fff4":r.score>=60?"#fffbeb":"#fff5f5";
                    return(
                      <tr key={i} style={{borderTop:"1px solid #e2e8f0"}}>
                        <td style={{padding:"11px 10px",color:"#a0aec0",fontSize:14,fontWeight:700}}>{i+1}</td>
                        <td style={{padding:"11px 10px",fontWeight:800,fontSize:15,color:"#1a202c"}}>{r.name}</td>
                        <td style={{padding:"11px 10px",color:"#718096",fontSize:13,fontWeight:600}}>{r.sn}</td>
                        <td style={{padding:"11px 10px",fontSize:12,fontWeight:700,color:"#1a56db"}}>{r.form}</td>
                        <td style={{padding:"11px 10px",textAlign:"center"}}><span style={{fontSize:22,fontWeight:900,color:gc}}>{r.score}</span></td>
                        <td style={{padding:"11px 10px",textAlign:"center"}}><span style={{padding:"3px 10px",borderRadius:99,fontSize:13,fontWeight:800,background:gbg,color:gc,border:`2px solid ${gc}`}}>{g}</span></td>
                        <td style={{padding:"11px 10px",color:"#a0aec0",fontSize:12,fontWeight:600}}>{r.time}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
